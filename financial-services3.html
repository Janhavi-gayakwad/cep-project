<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Female and Kids</title>
<style>
  /* General page styling */
  body, html {
    font-family: Arial, sans-serif;
    background-color: black;
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header styling for individual scheme title */
  h1 {
    background-color: #ff6908;
    color: #ffffff;
    padding: 15px 30px;
    border-radius: 15px;
    border: 3px solid #ffc885;
    transition: color 0.3s, background-color 0.3s, text-shadow 0.3s;
    font-size: 40px;
    margin: 20px 0;
    text-align: center;
  }

  /* Hover effect for h1 */
  h1:hover {
    color: #ffffff;
    background-color: #ffc885;
    text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
  }

  /* Subheader styling */
  h2 {
    color: #34f703;
    font-size: 32px;
    margin: 10px 0 20px;
    transition: color 0.3s, text-shadow 0.3s;
    text-align: center;
  }

  /* Hover effect for h2 */
  h2:hover {
    color: #46f500;
    text-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
  }

  /* Container for scheme boxes */
  .scheme-list-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 900px;
    padding: 20px;
  }

  /* Individual scheme box styling */
  .scheme-box {
    background-color: #023E8A;
    border: 3px solid #60B3D1;
    border-radius: 10px;
    color: white;
    width: 100%;
    max-width: 2000px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: background-color 0.3s, transform 0.3s;
    cursor: pointer;
  }

  /* Hover effect for each scheme box */
  .scheme-box:hover {
    background-color: #60B3D1;
    transform: scale(1.05);
  }

  /* Link styling for scheme box */
  .scheme-box a {
    color: inherit;
    text-decoration: none;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

</style>
</head>
<body>

<h1>Financial services</h1>
<h2>Available Schemes</h2>

<div class="scheme-list-container">
  <div class="scheme-box"><a href="goats.html">Group Supply Of Goats And Sheep</a></div>
 

</div>

</body>
</html>
