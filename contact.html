<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Page</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* Page Styling */
    body {
      background-color: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contact-container {
      background-color: #fff;
      padding: 2em;
      max-width: 600px;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .contact-container h1 {
      color: #2c3e50;
      margin-bottom: 1em;
    }

    .contact-container p {
      color: #7f8c8d;
      margin-bottom: 2em;
    }

    /* Contact Form Styling */
    form {
      display: flex;
      flex-direction: column;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 1em;
      border: 1px solid #dcdde1;
      border-radius: 5px;
      font-size: 1em;
      color: #2c3e50;
    }

    input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
    }

    button {
      background-color: #2980b9;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #1e6a91;
    }

    /* Contact Information */
    .contact-info {
      margin-top: 2em;
      color: #2c3e50;
    }

    .contact-info h3 {
      margin-bottom: 0.5em;
      font-size: 1.2em;
    }

    .contact-info p {
      margin: 0.5em 0;
    }

    .contact-info p i {
      color: #2980b9;
      margin-right: 8px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .contact-container {
        padding: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="contact-container">
    <h1>Contact Us</h1>
    <p>If you have any questions or need further information, please feel free to reach out to us.</p>

    <form action="contact_submit.php" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <h3>Get in Touch</h3>
      <p><i class="fa fa-map-marker-alt"></i>1234 Street Address, City, Country</p>
      <p><i class="fa fa-phone-alt"></i>+1 111 123 342 342</p>
      <p><i class="fa fa-envelope"></i>sevatric@govwebsite.gov</p>
    </div>
  </div>
</body>
</html>
